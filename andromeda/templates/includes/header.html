{% load static %}
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url "products:index" %}">
      <img src="{% static "fav/main_fav.png" %}" alt="" width="40" height="40">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        {% with request.resolver_match.view_name as view_name %}
          <li class="nav-item">
            <a class="nav-link {% if view_name == "goods:index" %}active{% endif %}"
              href="{% url "products:index" %}">
              Главная
            </a>
          </li>
          {% endwith %}
      </ul>
      {% if user.is_authenticated %}
        <div class="">
          <a class="text-decoration-none text-reset"
              href="">{{ user }}</a>
          <form method="post" action="{% url 'user:logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-primary">Выйти</button>
          </form>
        </div>
      {% else %}
        <div class="">
          <a class="text-decoration-none text-reset"
              href="{% url 'user:send_code' %}">Войти</a>
          {% comment %} <a class="text-decoration-none text-reset"
              href="{% url "user:register" %}">Регистрация</a> {% endcomment %}
        </div>
      {% endif %}
      <form class="d-flex" role="search">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search"/>
        <button class="btn btn-secondary" type="submit">Поиск</button>
      </form>
    </div>
  </div>
</nav>
