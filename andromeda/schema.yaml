  /api/v1/auth/logout/:
    post:
      operationId: v1_auth_logout_create
      description: |-
        Завершает пользовательскую сессию.

        Требует действующий access-токен в заголовке Authorization: Bearer token.
        Возвращает информацию о текущем пользователе и сообщение о разлогине.

        Raises:
            PermissionDenied: Если токен недействителен, истёк или пользователь
            неактивен.
            AuthenticationFailed: Если отсутствует или неверный token.

        Returns:
            Response: JSON с номером телефона пользователя и сообщением
            "Вы вышли из системы."
            Статус: 200 OK.
      summary: Выход - logout
      tags:
      - "\U0001F465 Аутентификация"
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/auth/send-code/:
    post:
      operationId: v1_auth_send_code_create
      description: |-
        Отправка одноразового кода подтверждения (OTP).

        Генерит 6-значный код в формате XXX-XXX, сохраняет в Redis с TTL 5 минут.
        Используется для двухфакторной аутентификации пользователей магазина.

        **Пример запроса:**
            POST /api/v1/auth/send-code/
            {
                "phone": "89123456789"
            }

        **Успешный ответ:**
            200 OK
            {
                "phone": "+79123456789",
                "code": "123-456"
            }

        **Ошибки:**
            400 Bad Request - неверный формат или номер телефона.
      summary: Получить OTP-код
      tags:
      - "\U0001F465 Аутентификация"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendCode'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SendCode'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SendCode'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendCode'
          description: ''
  /api/v1/auth/token-refresh/:
    post:
      operationId: v1_auth_token_refresh_create
      description: Обновление JWT-токена по refresh.
      summary: Обновить JWT-токен
      tags:
      - "\U0001F465 Аутентификация"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/v1/auth/verify-code/:
    post:
      operationId: v1_auth_verify_code_create
      description: |-
        Верификация одноразового кода подтверждения (OTP) и выдача JWT.

        Проверяет код в Redis (TTL 5 мин), создаёт/возвращает User по телефону.
        Для новых пользователей: отключает парольную авторизацию.
        Возвращает access/refresh токены для Bearer-аутентификации.

        **Пример запроса:**
            POST /api/v1/auth/verify-code/
            {
                "phone": "+79123456789",
                "code": "123-456"
            }

        **Успешный ответ:**
            200 OK:
            {
                "phone": "+79123456789",
                "access": "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...",
                "refresh": "eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..."
            }

        **Ошибки:**
            - 400 Bad Request: неверный код/формат телефона
            - 500 Internal Server Error: JWT ошибка

        Redis код удаляется после получения JWT-токена.
      summary: Получить JWT-токен по коду
      tags:
      - "\U0001F465 Аутентификация"
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCode'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/VerifyCode'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/VerifyCode'
        required: true
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyCode'
          description: ''
  /api/v1/products/:
    get:
      operationId: v1_products_list
      description: |-
        ViewSet для просмотра товаров (только чтение).

        Предоставляет API-эндпоинты для получения списка опубликованных товаров
        и детальной информации по артикулу.

        Эндпоинты:
            GET /api/v1/products/?limit=20&offset=0 — список товаров
            GET /api/v1/products/123-456/ — товар по артикулу

        Примечания:
            - Пагинация через query-параметры limit/offset
            - Только опубликованные товары (card_objects)
      parameters:
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      tags:
      - "\U0001F4E6 Товары"
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductList'
          description: ''
  /api/v1/products/{articul}/:
    get:
      operationId: v1_products_retrieve
      description: |-
        ViewSet для просмотра товаров (только чтение).

        Предоставляет API-эндпоинты для получения списка опубликованных товаров
        и детальной информации по артикулу.

        Эндпоинты:
            GET /api/v1/products/?limit=20&offset=0 — список товаров
            GET /api/v1/products/123-456/ — товар по артикулу

        Примечания:
            - Пагинация через query-параметры limit/offset
            - Только опубликованные товары (card_objects)
      parameters:
      - in: path
        name: articul
        schema:
          type: string
          title: Артикул
        required: true
      tags:
      - "\U0001F4E6 Товары"
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          description: ''
components:
  schemas:
    Brand:
      type: object
      description: Сериализатор модели Brand.
      properties:
        title:
          type: string
          title: Название
          maxLength: 250
        description:
          type: string
          title: Описание
      required:
      - title
    Collection:
      type: object
      description: Сериализатор модели Collection.
      properties:
        title:
          type: string
          title: Название
          maxLength: 250
        description:
          type: string
          title: Описание
      required:
      - title
    Image:
      type: object
      description: Сериализатор модели Image.
      properties:
        img_url:
          type: string
          format: uri
          title: Путь к картинке
        is_main:
          type: boolean
          title: Заглавная картинка
        is_pack:
          type: boolean
          title: Упаковка
      required:
      - is_main
      - is_pack
    PaginatedProductList:
      type: object
      required:
      - count
      - results
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=400&limit=100
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?offset=200&limit=100
        results:
          type: array
          items:
            $ref: '#/components/schemas/Product'
    Product:
      type: object
      description: Сериализатор модели Product.
      properties:
        id:
          type: integer
          readOnly: true
        articul:
          type: string
          title: Артикул
          maxLength: 7
        title:
          type: string
          title: Название
          maxLength: 250
        description:
          type: string
          title: Описание
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,6}(?:\.\d{0,2})?$
          title: Розничная цена
        is_published:
          type: boolean
          title: Опубликовано
          description: Снимите галочку, чтобы скрыть публикацию.
        collection:
          allOf:
          - $ref: '#/components/schemas/Collection'
          readOnly: true
        brand:
          allOf:
          - $ref: '#/components/schemas/Brand'
          readOnly: true
        second_category:
          type: string
          title: Название
          readOnly: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/Image'
          readOnly: true
        created_at:
          type: string
          format: date-time
          title: Добавлено
        update_at:
          type: string
          format: date-time
          title: Обновлено
      required:
      - articul
      - brand
      - collection
      - id
      - images
      - second_category
      - title
    SendCode:
      type: object
      description: |-
        Сериализатор для отправки кода подтверждения.

        Проверяет корректность и нормализует телефон в E.164 (+79123456789).
      properties:
        phone:
          type: string
          maxLength: 17
      required:
      - phone
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    VerifyCode:
      type: object
      description: |-
        Верификация SMS-кода подтверждения.

        Сверяет код из запроса с тем, что хранится в Redis.
      properties:
        phone:
          type: string
          maxLength: 17
        code:
          type: string
          maxLength: 7
      required:
      - code
      - phone
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
